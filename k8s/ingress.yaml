apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-ingress
  namespace: devops-platform
spec:
  rules:
    - host: mindtrack.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

    - host: auth.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 8000

    - host: journal.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: journal-service
                port:
                  number: 8000